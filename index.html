  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 99px; }

    /* Animations */
    @keyframes orb-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,192,80,0.35); }
      50%       { box-shadow: 0 0 0 8px rgba(0,192,80,0); }
    }
    @keyframes dot-blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.6); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .orb-pulse  { animation: orb-pulse  2.5s ease-in-out infinite; }
    .dot-blink  { animation: dot-blink  1.6s ease-in-out infinite; }
    .spin-slow  { animation: spin-slow  1.1s linear infinite; }
    .fade-in-up { animation: fade-in-up 0.3s ease-out both; }

    /* Sidebar active left border */
    .nav-active::before {
      content: '';
      position: absolute; left: 0; top: 5px; bottom: 5px;
      width: 3px; background: #00C050; border-radius: 0 3px 3px 0;
    }

    /* Stage bar transition */
    .stage-bar { transition: width 0.6s cubic-bezier(.4,0,.2,1); }

    /* Chart canvas sizing */
    .chart-wrap { position: relative; height: 208px; }

    /* Connector line in activity feed */
    .feed-line { width: 1.5px; background: #F1F5F9; flex: 1; min-height: 10px; margin: 2px 0; }

    /* Table row hover */
    tbody tr:hover td { background: #FAFAFA; }

    /* Highlighted table row (bottleneck stage link) */
    tbody tr.row-highlighted td { background: #F0FBF4 !important; }
    tbody tr.row-highlighted { box-shadow: inset 3px 0 0 #00C050; }

    /* Tooltip */
    .has-tip { position: relative; }
    .tip {
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #1E2330; color: #fff; font-size: 11px; padding: 4px 10px;
      border-radius: 6px; white-space: nowrap; pointer-events: none; opacity: 0;
      transition: opacity .15s; z-index: 300;
    }
    .has-tip:hover .tip { opacity: 1; }

    /* Bottleneck stage item */
    .stage-item { cursor: pointer; transition: all 0.15s; }
    .stage-item:hover { background: #FAFAFA !important; }
    .stage-item.stage-selected { background: #F0FBF4 !important; border-color: #00C050 !important; }
  </style>
</head>

/* ─── BOTTLENECK PANEL ───────────────────────────────── */
/* Click a stage to filter/highlight matching rows in the risk table below */
const BottleneckPanel = ({ selectedStage, setSelectedStage }) => {
  const maxDelay = Math.max(...STAGES.map(s => s.avgDelay));
  return (
    <Card>
      <CardHeader>
        <CardTitle icon="⚡" iconBg="bg-gray-50">Stage Bottleneck Detector</CardTitle>
        <div className="flex items-center gap-2">
          <Pill variant="gray">2 Slow Stages</Pill>
          {selectedStage && (
            <button onClick={() => setSelectedStage(null)}
              className="text-[10.5px] text-[#7B7B7B] hover:text-gray-600 cursor-pointer bg-transparent border-0 font-sans">
              Clear ✕
            </button>
          )}
        </div>
      </CardHeader>

      {/* Instruction hint shown when nothing is selected */}
      {!selectedStage && (
        <p className="text-[11px] text-[#7B7B7B] px-4 pt-3 pb-0">
          Click a stage to highlight related documents below.
        </p>
      )}

      {/* Confirmation banner when a stage is selected */}
      {selectedStage && (
        <div className="mx-4 mt-3 px-3 py-2 bg-brand-faint border border-brand/20 rounded-lg text-[12px] text-brand-hover flex items-center gap-2">
          <span>✦</span>
          <span>Showing documents in <strong>{selectedStage}</strong> in the table below.</span>
        </div>
      )}

      <div className="p-4 flex flex-col gap-2">
        {STAGES.map(s => {
          const pct      = (s.avgDelay / maxDelay) * 100;
          const over     = s.avgDelay > s.target;
          const overPct  = over ? Math.round(((s.avgDelay - s.target) / s.target) * 100) : 0;
          /* Neutral palette: green = ok, medium gray = warning, dark gray = critical */
          const barColor  = s.status === "critical" ? "#4B5563" : s.status === "warning" ? "#9CA3AF" : "#00C050";
          const dotClass  = s.status === "critical" ? "bg-gray-600" : s.status === "warning" ? "bg-gray-400" : "bg-brand";
          const isSelected = selectedStage === s.name;
          return (
            <div key={s.name}
              onClick={() => setSelectedStage(isSelected ? null : s.name)}
              className={`stage-item border rounded-xl p-3.5 ${isSelected ? 'stage-selected' : 'bg-white border-[#E5E5E5]'}`}>
              <div className="flex items-center justify-between mb-2.5">
                <span className="text-[12.5px] font-semibold text-gray-800 flex items-center gap-2">
                  <span className={`w-2 h-2 rounded-full flex-shrink-0 ${dotClass}`}/>
                  {s.name}
                </span>
                <div className="flex items-center gap-2">
                  <span className="text-[12.5px] font-bold text-gray-700">{s.avgDelay}d avg</span>
                  {over && (
                    <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-md uppercase tracking-wide bg-gray-100 text-gray-600">
                      +{overPct}% over SLA
                    </span>
                  )}
                </div>
              </div>
              <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div className="stage-bar h-full rounded-full" style={{width:`${pct}%`, background:barColor}}/>
              </div>
              <div className="flex justify-between mt-2 text-[11px] text-[#7B7B7B]">
                <span>{s.docs} documents in stage</span>
                <span>Target: {s.target}d</span>
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
};

/* "Run AI Analysis" button cycles through 3 insight sets with a loading state */

        </div>
      </div>

      {/* Metrics row */}
      <div className="grid grid-cols-3 gap-2.5 px-4 pt-3.5 pb-0">
        {[{val:"72%",lbl:"SLA Rate"},{val:"3",lbl:"At Risk"},{val:"4.1d",lbl:"Avg Review"}].map(m => (
          <div key={m.lbl} className="bg-[#FAFAFA] border border-[#F0F0F0] rounded-lg py-2.5 text-center">

            <div className="text-[10px] text-[#7B7B7B] mt-0.5">{m.lbl}</div>

          {analyzing
            ? <><span className="inline-block w-3 h-3 border-2 border-brand/30 border-t-brand rounded-full spin-slow"/>&nbsp;Analyzing…</>
            : <><Icons.sparkle/> Run AI Analysis</>
          }
        </button>
      </div>

      {/* Section label with set counter */}
      <p className="text-[10.5px] font-semibold uppercase tracking-wider text-[#7B7B7B] px-4 pt-3 pb-1 flex items-center gap-1.5">

      <div key={animKey} className="flex-1 px-3 pb-1 flex flex-col gap-2 overflow-y-auto">
